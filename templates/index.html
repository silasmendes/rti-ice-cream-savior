<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧊 ColdChain Telemetry Simulator</title>
<style>
/* ── Reset & base ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* ── Header / Controls ─────────────────────────────────── */
header{background:#1e293b;padding:1rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;border-bottom:1px solid #334155}
header h1{font-size:1.4rem;white-space:nowrap}
.controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.controls label{font-size:.85rem;color:#94a3b8}
.controls input[type=number]{width:5rem;padding:.35rem .5rem;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:.9rem}
button{padding:.45rem 1.1rem;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-start{background:#22c55e;color:#052e16}
.btn-start:hover{background:#16a34a}
.btn-stop{background:#ef4444;color:#fff}
.btn-stop:hover{background:#dc2626}
.btn-start:disabled,.btn-stop:disabled{opacity:.45;cursor:not-allowed}
.btn-outage{background:#f59e0b;color:#1e293b}
.btn-outage:hover{background:#d97706}
.btn-outage.active{background:#dc2626;color:#fff}
.btn-outage.active:hover{background:#b91c1c}
.status-badge{padding:.3rem .75rem;border-radius:999px;font-size:.75rem;font-weight:600}
.status-badge.running{background:#22c55e22;color:#4ade80;border:1px solid #22c55e55}
.status-badge.stopped{background:#ef444422;color:#f87171;border:1px solid #ef444455}
.run-id{font-size:.8rem;color:#64748b;font-family:monospace}

/* ── Grid ──────────────────────────────────────────────── */
main{padding:1.5rem 2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}

/* ── Freezer Card ──────────────────────────────────────── */
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1rem;transition:border-color .2s}
.card:hover{border-color:#3b82f6}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.card-header .id{font-weight:700;font-size:.9rem;color:#93c5fd}
.card-header .icon{font-size:1.3rem}

.props{display:flex;flex-direction:column;gap:.55rem}
.prop{display:flex;align-items:center;justify-content:space-between;font-size:.82rem}
.prop-label{color:#94a3b8}

/* temperature input */
.temp-input{width:4.5rem;padding:.2rem .4rem;border:1px solid #475569;border-radius:4px;background:#0f172a;color:#e2e8f0;font-size:.82rem;text-align:right}

/* toggle switch */
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#475569;border-radius:22px;transition:.2s}
.toggle .slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#e2e8f0;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#3b82f6}
.toggle input:checked+.slider::before{transform:translateX(18px)}

/* power select */
.power-select{padding:.2rem .3rem;border:1px solid #475569;border-radius:4px;background:#0f172a;color:#e2e8f0;font-size:.82rem}

/* Temp color coding */
.temp-ok{color:#4ade80}
.temp-warn{color:#fbbf24}
.temp-danger{color:#f87171}

.seq{font-size:.7rem;color:#64748b;margin-top:.35rem;text-align:right;font-family:monospace}
.actual-temp{font-weight:700;font-size:.95rem;font-family:monospace}

/* ── Inventory bar ─────────────────────────────────────── */
.inventory{margin-top:.6rem}
.inventory-header{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;margin-bottom:.3rem}
.inventory-header .inv-label{color:#94a3b8}
.inventory-header .inv-value{font-weight:700;font-family:monospace}
.inv-ok{color:#4ade80}
.inv-warn{color:#fbbf24}
.inv-danger{color:#f87171}
.bar-track{height:8px;background:#334155;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease,background .3s}
.bar-fill.inv-fill-ok{background:#22c55e}
.bar-fill.inv-fill-warn{background:#f59e0b}
.bar-fill.inv-fill-danger{background:#ef4444}
.restock-badge{display:inline-flex;align-items:center;gap:.25rem;margin-top:.35rem;padding:.15rem .5rem;border-radius:999px;font-size:.7rem;font-weight:600;background:#ef444422;color:#fca5a5;border:1px solid #ef444455}
.restock-badge.hidden{display:none}

/* ── God-mode collapsible ──────────────────────────────── */
.god-mode{margin-top:.6rem;border:1px solid #334155;border-radius:8px;overflow:hidden}
.god-mode summary{cursor:pointer;padding:.4rem .65rem;font-size:.72rem;font-weight:600;color:#f59e0b;background:#1a2233;user-select:none;list-style:none;display:flex;align-items:center;gap:.35rem}
.god-mode summary::-webkit-details-marker{display:none}
.god-mode summary::before{content:'\25B6';font-size:.6rem;transition:transform .15s}
.god-mode[open] summary::before{transform:rotate(90deg)}
.god-mode .gm-body{padding:.5rem .65rem;display:flex;flex-direction:column;gap:.5rem;background:#13192688}
.god-mode .gm-body .prop{display:flex;align-items:center;justify-content:space-between;font-size:.82rem}
.inv-input{width:4.5rem;padding:.2rem .4rem;border:1px solid #475569;border-radius:4px;background:#0f172a;color:#e2e8f0;font-size:.82rem;text-align:right}
</style>
</head>
<body>

<header>
  <h1>🧊 ColdChain Telemetry Simulator</h1>
  <div class="controls">
    <button class="btn-start" id="btnStart" onclick="startSim()">▶ Start</button>
    <button class="btn-stop"  id="btnStop" onclick="stopSim()" disabled>■ Stop</button>
    <label>Interval (s)
      <input type="number" id="intervalInput" min="1" value="60">
    </label>
    <button onclick="setInterval_()">Set</button>
    <button class="btn-outage" id="btnOutage" onclick="toggleOutage()">⚡ Power Outage</button>
    <span id="statusBadge" class="status-badge stopped">STOPPED</span>
    <span id="runId" class="run-id"></span>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
const grid = document.getElementById('grid');

/* ── Build cards ──────────────────────────────────────── */
function buildCards(freezers) {
  grid.innerHTML = '';
  freezers.forEach(f => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + f.deviceId;
    card.innerHTML = `
      <div class="card-header">
        <span class="id">${f.deviceId}</span>
        <span class="icon">${f.powerState === 'on' ? '❄️' : '⚠️'}</span>
      </div>
      <div class="props">
        <div class="prop">
          <span class="prop-label">Actual °C</span>
          <span class="actual-temp" id="actual-${f.deviceId}">${f.actualTemperature}</span>
        </div>
      </div>
      ${buildInventoryHTML(f)}
      <details class="god-mode">
        <summary>⚡ God Mode</summary>
        <div class="gm-body">
          <div class="prop">
            <span class="prop-label">Set °C</span>
            <input class="temp-input" type="number" step="0.5" value="${f.temperature}"
                   data-device="${f.deviceId}" onchange="patchFreezer(this.dataset.device, {temperature: parseFloat(this.value)})">
          </div>
          <div class="prop">
            <span class="prop-label">Door</span>
            <label class="toggle">
              <input type="checkbox" ${f.doorOpen ? 'checked' : ''}
                     data-device="${f.deviceId}" onchange="patchFreezer(this.dataset.device, {doorOpen: this.checked})">
              <span class="slider"></span>
            </label>
          </div>
          <div class="prop">
            <span class="prop-label">Power</span>
            <select class="power-select" data-device="${f.deviceId}"
                    onchange="patchFreezer(this.dataset.device, {powerState: this.value})">
              <option value="on"  ${f.powerState === 'on'  ? 'selected' : ''}>ON</option>
              <option value="off" ${f.powerState === 'off' ? 'selected' : ''}>OFF</option>
            </select>
          </div>
          <div class="prop">
            <span class="prop-label">Inventory %</span>
            <input class="inv-input" type="number" step="1" min="0" max="100" value="${Math.round(f.inventoryLevelPercent)}"
                   data-device="${f.deviceId}" onchange="patchFreezer(this.dataset.device, {inventoryLevelPercent: parseFloat(this.value)})">
          </div>
        </div>
      </details>
      <div class="seq" id="seq-${f.deviceId}">seq: ${f.sequenceNumber}</div>
    `;
    grid.appendChild(card);
  });
}

/* ── Inventory bar helper ──────────────────────────────── */
function invColorClass(pct) {
  if (pct < 20) return 'danger';
  if (pct < 50) return 'warn';
  return 'ok';
}

function buildInventoryHTML(f) {
  const pct = f.inventoryLevelPercent ?? 0;
  const cls = invColorClass(pct);
  const restock = f.restockCyclesRemaining ?? 0;
  return `
    <div class="inventory" id="inv-${f.deviceId}">
      <div class="inventory-header">
        <span class="inv-label">Inventory</span>
        <span class="inv-value inv-${cls}">${pct.toFixed(1)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill inv-fill-${cls}" style="width:${Math.min(pct,100)}%"></div>
      </div>
      <span class="restock-badge${restock > 0 ? '' : ' hidden'}" id="restock-${f.deviceId}">🚚 Restock in ${restock} cycles</span>
    </div>`;
}

/* ── Update card visuals without full rebuild ─────────── */
function refreshCards(freezers) {
  freezers.forEach(f => {
    const seqEl = document.getElementById('seq-' + f.deviceId);
    if (seqEl) seqEl.textContent = 'seq: ' + f.sequenceNumber;
    const card = document.getElementById('card-' + f.deviceId);
    if (card) {
      const icon = card.querySelector('.icon');
      icon.textContent = f.powerState === 'on' ? '❄️' : '⚠️';
      const sel = card.querySelector('.power-select');
      if (sel && document.activeElement !== sel) sel.value = f.powerState;
      const invInput = card.querySelector('.inv-input');
      if (invInput && document.activeElement !== invInput) invInput.value = Math.round(f.inventoryLevelPercent);
    }
    const actualEl = document.getElementById('actual-' + f.deviceId);
    if (actualEl) {
      actualEl.textContent = f.actualTemperature;
      const diff = f.actualTemperature - f.temperature;
      actualEl.className = 'actual-temp ' + (diff > 4 ? 'temp-danger' : diff > 2 ? 'temp-warn' : 'temp-ok');
    }

    /* Inventory bar refresh */
    const invWrap = document.getElementById('inv-' + f.deviceId);
    if (invWrap) {
      const pct = f.inventoryLevelPercent ?? 0;
      const cls = invColorClass(pct);
      const valSpan = invWrap.querySelector('.inv-value');
      valSpan.textContent = pct.toFixed(1) + '%';
      valSpan.className = 'inv-value inv-' + cls;
      const bar = invWrap.querySelector('.bar-fill');
      bar.style.width = Math.min(pct, 100) + '%';
      bar.className = 'bar-fill inv-fill-' + cls;
      const badge = document.getElementById('restock-' + f.deviceId);
      const restock = f.restockCyclesRemaining ?? 0;
      if (restock > 0) {
        badge.textContent = '🚚 Restock in ' + restock + ' cycles';
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }
  });
}

/* ── API helpers ──────────────────────────────────────── */
async function fetchState() {
  const res = await fetch('/api/state');
  return res.json();
}

async function patchFreezer(deviceId, data) {
  await fetch('/api/freezer/' + deviceId, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
}

async function startSim() {
  const res = await fetch('/api/start', {method: 'POST'});
  if (res.ok) {
    const d = await res.json();
    updateUI(true, d.demoRunId);
  }
}

async function stopSim() {
  await fetch('/api/stop', {method: 'POST'});
  updateUI(false, null);
}

async function setInterval_() {
  const val = parseInt(document.getElementById('intervalInput').value, 10);
  if (val < 1) return;
  await fetch('/api/interval', {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({interval: val})
  });
}

let outageActive = false;
async function toggleOutage() {
  outageActive = !outageActive;
  await fetch('/api/power-outage', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({outage: outageActive})
  });
  const btn = document.getElementById('btnOutage');
  btn.classList.toggle('active', outageActive);
  btn.textContent = outageActive ? '⚡ Restore Power' : '⚡ Power Outage';
}

function updateUI(running, runId) {
  document.getElementById('btnStart').disabled = running;
  document.getElementById('btnStop').disabled  = !running;
  const badge = document.getElementById('statusBadge');
  badge.textContent = running ? 'RUNNING' : 'STOPPED';
  badge.className   = 'status-badge ' + (running ? 'running' : 'stopped');
  document.getElementById('runId').textContent = runId ? runId : '';
}

/* ── Init & polling ───────────────────────────────────── */
let initialized = false;
let lastFreezerCount = 0;
async function poll() {
  try {
    const state = await fetchState();
    if (!initialized || state.freezers.length !== lastFreezerCount) {
      buildCards(state.freezers);
      lastFreezerCount = state.freezers.length;
      initialized = true;
    } else {
      refreshCards(state.freezers);
    }
    const intervalEl = document.getElementById('intervalInput');
    if (document.activeElement !== intervalEl) {
      intervalEl.value = state.interval;
    }
    updateUI(state.running, state.demoRunId);
  } catch(e) { /* ignore transient errors */ }
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
